version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - mineracao-net

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - REDIS_URL=redis://redis:6379
      - URLSCAN_API_KEY=${URLSCAN_API_KEY}
      - NEXT_PUBLIC_CONVEX_URL=${NEXT_PUBLIC_CONVEX_URL}
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-3}
      - DISCOVERY_INTERVAL_HOURS=${DISCOVERY_INTERVAL_HOURS:-6}
    depends_on:
      - redis
    networks:
      - mineracao-net

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.scheduler
    environment:
      - REDIS_URL=redis://redis:6379
      - DISCOVERY_INTERVAL_HOURS=${DISCOVERY_INTERVAL_HOURS:-6}
    depends_on:
      - worker
    networks:
      - mineracao-net

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_CONVEX_URL=${NEXT_PUBLIC_CONVEX_URL}
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
    depends_on:
      - redis
    networks:
      - mineracao-net

networks:
  mineracao-net:
    driver: bridge
