version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mineracao_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mineracao-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - mineracao-net

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/mineracao_db
      - REDIS_URL=redis://redis:6379
      - URLSCAN_API_KEY=${URLSCAN_API_KEY}
    depends_on:
      - postgres
      - redis
    networks:
      - mineracao-net

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.scheduler
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - worker
    networks:
      - mineracao-net

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/mineracao_db
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - mineracao-net

volumes:
  postgres_data:

networks:
  mineracao-net:
    driver: bridge
